name: prism
description: "A holographic e-reader with deep visual theming."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.0
  xml: ^6.5.0
  file_picker: ^8.1.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  image_path: "assets/images/prism_icon.png"

flutter:
  uses-material-design: true

  shaders:
    - shaders/holographic.frag

  assets:
    - test/fixtures/test_book.epub
    - assets/images/prism_logo.png
